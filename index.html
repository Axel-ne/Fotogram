<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="./assets/icons/fotogram-icon.png">
</head>

<body">
    <header>
        <div class="header-content">
            <img src="./assets/icons/fotogram-icon.png" alt="">
            <p>Fotogram</p>
        </div>
    </header>
    <main>
        <section class="main-section">
            <h1>Your personal photo album</h1>
            <div id="container" class="img-content">

            </div>
        </section>
        <dialog id="myDialog">
            <header class="dialog-header">
                <div class="dialog-header-text">
                <p>test</p>
                </div>
                <div class="dialog-header-button">
                    <button onclick="closeDialog()"><img src="./assets/icons/Close icon.png" alt=""></button>
                </div>
            </header>
            <section class="dialog-section">
                <img src="./assets/imgs/Component 11.png" alt="">
            </section>
            <footer class="dialog-footer">
                <div class="dialog-footer-content">
                    <button class="dialog-button" href=""><img src="./assets/icons/Arrow-Left.png" alt=""></button>
                    <p>1/12</p>
                    <button class="dialog-button"><img src="./assets/icons/Arrow-Right (1).png" alt=""></button>
                </div>
            </footer>
        </dialog>
    </main>
    <footer class="footer-content">
        <img src="./assets/imgs/Subtract.png" alt="">
        <section class="footer-section">
            <div class="footer-icons">
                <img src="./assets/icons/Logo (1).png" alt="">
            </div>
            <div class="footer-text">
                <p>© 2023 Developer Akademie GmbH</p>
            </div>

        </section>
    </footer>
    <script src="script.js"></script>
    </body>

</html>
